services:
  postgres:
    image: postgres:16-alpine
    container_name: hero-rpg-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hero
      POSTGRES_PASSWORD: hero_secret
      POSTGRES_DB: hero_rpg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hero-rpg-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hero.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
